kind: "DatadogAgent"
apiVersion: "datadoghq.com/v2alpha1"
metadata:
  name: "datadog"
  namespace: "datadog"
spec:
  global:
    clusterName: "your-cluster-name-here"
    site: "ap1.datadoghq.com"
    credentials:
      apiSecret:
        secretName: "datadog-secret"
        keyName: "api-key"
    registry: "registry.datadoghq.com"
    tags:
      - "env:dev"
  features:
    clusterChecks:
      enabled: true
    orchestratorExplorer:
      enabled: true
    apm:
      instrumentation:
        enabled: true
        targets:
          - name: "default-target"
            ddTraceVersions:
              java: "1"
              python: "4"
              js: "5"
              php: "1"
              dotnet: "3"
              ruby: "2"
            ddTraceConfigs:
              - name: "DD_RUM_ENABLED"
                value: "true"
              - name: "DD_RUM_APPLICATION_ID"
                value: "41f3cdff-1caa-4b6e-9e5c-f6321e85ffdb"
              - name: "DD_RUM_CLIENT_TOKEN"
                value: "pub2aa8ae611f7715fd1986a1ee51083a2b"
              - name: "DD_RUM_REMOTE_CONFIGURATION_ID"
                value: "16b811c2-ba6a-4f79-8636-4542c3335031"
              - name: "DD_RUM_SITE"
                value: "ap1.datadoghq.com"
    logCollection:
      enabled: true
      containerCollectAll: true
