apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-service-monitor
  namespace: monitoring

spec:
  selector:
    matchLabels:
      app: order-service
  
  nameSpaceSelector:
    matchNames:
      - ecommerce
  
  endpoints:
    - port: http
      path: /metrics
      interval: 15s