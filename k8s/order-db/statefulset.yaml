apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-order
  namespace: ecommerce

spec:
  serviceName: auth-order
  replicas: 1
  selector:
    matchLabels:
      app: auth-order
  
  template:
    metadata:
      labels:
        app: auth-order

    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: auth-order-secret
                  key: MYSQL_DATABASE

            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-order-secret
                  key: MYSQL_ROOT_PASSWORD
          
          volumeMounts:
            - name: auth-order-storage
              mountPath: /var/lb/mysql
  
  volumeClaimTemplates:
    - metadata:
        name: auth-order-storage
      
      spec:
        accessModes:
          - ReadWriteOnce
        
        resources:
          requests:
            storage: 2Gi
