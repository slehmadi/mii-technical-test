apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce

spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  
  template:
    metadata:
      labels:
        app: product-service
    
    spec:
      containers:
        - name: product-service
          image: ghcr.io/slehmadi/product-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: product-db
            
            - name: DB_PORT
              value: "3306"

            - name: DB_NAME
              value: ecommerce_product
            
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: DB_USER
            
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: DB_PASSWORD
            
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: SECRET_KEY
            
            - name: ALGORITHM
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: ALGORITHM
            
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            
            - name: BACKEND_CORS_ORIGINS
              value: '["http://shop.local"]'