apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ecommerce

spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  
  template:
    metadata:
      labels:
        app: frontend
    
    spec:
      containers:
        - name: frontend
          image: ghcr.io/slehmadi/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: VITE_DD_APP_ID
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: VITE_DD_APP_ID

            - name: VITE_DD_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: VITE_DD_CLIENT_TOKEN
            
            - name: VITE_DD_SITE
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: VITE_DD_SITE