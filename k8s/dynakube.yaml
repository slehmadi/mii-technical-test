apiVersion: dynatrace.com/v1beta3
kind: DynaKube

metadata:
  name: dynakube
  namespace: dynatrace

spec:
  apiUrl: https://YOUR_ENVIRONMENT_ID.live.dynatrace.com/api

  tokens: dynakube

  oneAgent:
    applicationMonitoring:
      namespaceSelector:
        matchLabels:
          monitored: "true"