name: Frontend CI

on:
  push:
    branches:
      - main

    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build ViteJS App
        env:
          VITE_DD_APP_ID: ${{ secrets.VITE_DD_APP_ID }}
          VITE_DD_CLIENT_TOKEN: ${{ secrets.VITE_DD_CLIENT_TOKEN }}
          VITE_DD_SITE: ${{ secrets.VITE_DD_SITE }}
        run: npm run build