name: Backend CI

on:
  push:
    branches:
      - main

    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  auth-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend/auth-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.5'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff Lint
        run: ruff check .
    
      - name: Run Pytest
        env:
            DB_HOST: localhost
            DB_PORT: 3306
            DB_USER: test
            DB_PASSWORD: test
            DB_NAME: test

            SECRET_KEY: test_secret_key
            ALGORITHM: HS256
            ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: pytest --maxfail=1 -v

  product-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend/product-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.5'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff Lint
        run: ruff check .
    
      - name: Run Pytest
        env:
            DB_HOST: localhost
            DB_PORT: 3306
            DB_USER: test
            DB_PASSWORD: test
            DB_NAME: test

            SECRET_KEY: test_secret_key
            ALGORITHM: HS256
            ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: pytest --maxfail=1 -v

  order-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend/order-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.5'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff Lint
        run: ruff check .
    
      - name: Run Pytest
        env:
            DB_HOST: localhost
            DB_PORT: 3306
            DB_USER: test
            DB_PASSWORD: test
            DB_NAME: test

            BACKEND_CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
        run: pytest --maxfail=1 -v